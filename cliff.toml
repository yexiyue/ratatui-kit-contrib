# git-cliff 配置 ~ https://git-cliff.org/docs/configuration
#
# 本仓库是「官方扩展 monorepo」，每个成员 crate 独立版本、独立发布，标签形如
# `ratatui-kit-<name>-v<version>`（例如 `ratatui-kit-markdown-v0.1.0`）。
# CD 在发布某个 crate 时应当传入 per-crate 的 `--tag-pattern`，例如：
#
#   git cliff --tag-pattern '^ratatui-kit-markdown-v[0-9].*' \
#             --include-path 'crates/ratatui-kit-markdown/**'
#
# 这样 CHANGELOG 只按「该 crate」的发布标签分节、只统计该 crate 目录下的提交。
# 下面的 `tag_pattern` 是通用兜底：匹配任意 `ratatui-kit-<name>-v<version>` 标签。
#
# 已踩坑（ratatui-kit-themes-v0.1.0 首发）：`--tag-pattern` + `--include-path` 组合要求
# 标签所指向的 commit 本身必须命中 include-path 过滤，否则 git-cliff 解析不出版本号，
# 渲染成 `## [unreleased]`（CHANGELOG.md 和 GitHub Release notes 都会错）。若某 crate
# 打 tag 时 HEAD 恰好是另一个 crate 的发布提交（不触碰本 crate 目录），务必把标签打在
# 「最后一个真正改动了该 crate 目录的 commit」上，而不是当前 HEAD。

[changelog]
# 每个 release 渲染的 Tera 模板（keepachangelog 风格）。
# version 形如 `ratatui-kit-markdown-v0.1.0`；用 `-v` 切分后取末段并去掉可能残留的 `v`，
# 显示为 `## [0.1.0]`，从而对任意 crate 前缀都成立。
body = """
{% if version %}\
    ## [{{ version | split(pat="-v") | last | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true
render_always = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
commit_preprocessors = []
protect_breaking_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^doc", group = "<!-- 3 -->📚 Documentation" },
    { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
    { message = "^refactor", group = "<!-- 2 -->🚜 Refactor" },
    { message = "^style", group = "<!-- 5 -->🎨 Styling" },
    { message = "^test", group = "<!-- 6 -->🧪 Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore|^ci", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
    { body = ".*security", group = "<!-- 8 -->🛡️ Security" },
    { message = "^revert", group = "<!-- 9 -->◀️ Revert" },
    { message = ".*", group = "<!-- 10 -->💼 Other" },
]
filter_commits = false
fail_on_unmatched_commit = false
link_parsers = []
# 通用兜底：把任意成员 crate 的发布标签 `ratatui-kit-<name>-v<version>` 视为 release 边界。
# 发布单个 crate 时，CD 用 CLI 的 `--tag-pattern` 覆盖为该 crate 专属的前缀。
tag_pattern = "^ratatui-kit-[a-z0-9-]+-v[0-9].*"
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
